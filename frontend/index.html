<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Google Analytics loaded only after cookie consent (see CookieConsentContext) -->
  <link rel="icon" type="image/webp" href="/Cachelogo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet"> -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <!-- DotLottie WC for Lottie animations (used by chatbot icon) -->
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.1/dist/dotlottie-wc.js" type="module"></script>
  <title>CacheDigitech</title>
  <style>
    #app-loader { position: fixed; inset: 0; z-index: 99999; background: #0a0a0b; display: flex; align-items: center; justify-content: center; padding: 16px; box-sizing: border-box; }
    #app-loader-img { width: 160px; height: auto; max-width: 65vw; object-fit: contain; }
    @media (min-width: 480px) { #app-loader-img { width: 180px; max-width: 60vw; } }
    @media (min-width: 768px) { #app-loader-img { width: 180px; max-width: 220px; } }
  </style>
</head>

<body>
  <div id="app-loader">
    <img id="app-loader-img" src="/loading.gif" alt="Loading" />
  </div>
  <div id="root"></div>
  <script>
    (function () {
      if (window.location.protocol === 'file:') {
        document.body.innerHTML = [
          '<div style="font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0b; color: #fff; padding: 24px; box-sizing: border-box;">',
          '<div style="text-align: center; max-width: 420px;">',
          '<h1 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 12px;">Cannot open directly from file</h1>',
          '<p style="color: #a1a1aa; margin-bottom: 20px; line-height: 1.5;">This app uses ES modules. Browsers block them when the page is opened from a file (file://). Serve the <code style="background: #27272a; padding: 2px 6px; border-radius: 4px;">dist</code> folder with a local server.</p>',
          '<p style="color: #a1a1aa; margin-bottom: 16px; font-size: 0.9rem;">From the <code style="background: #27272a; padding: 2px 6px; border-radius: 4px;">frontend</code> folder run:</p>',
          '<pre style="background: #27272a; padding: 12px 16px; border-radius: 8px; text-align: left; overflow-x: auto; font-size: 0.85rem;">npm run preview</pre>',
          '<p style="color: #71717a; margin-top: 16px; font-size: 0.8rem;">Then open the URL shown (e.g. http://localhost:4173)</p>',
          '</div></div>'
        ].join('');
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
