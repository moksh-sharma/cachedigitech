<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – CacheDigitech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
      <div class="text-center mb-8">
        <h1 class="text-xl font-semibold text-slate-800">CacheDigitech</h1>
        <p class="text-slate-500 text-sm mt-1">Admin portal</p>
      </div>
      <form id="login-form" class="space-y-4">
        <div id="login-error" class="hidden text-red-600 text-sm text-center bg-red-50 rounded-lg py-2"></div>
        <div>
          <label for="email" class="block text-sm font-medium text-slate-600 mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-slate-800 focus:ring-2 focus:ring-slate-400 focus:border-slate-400" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-600 mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-slate-800 focus:ring-2 focus:ring-slate-400 focus:border-slate-400" />
        </div>
        <button type="submit" id="submit-btn"
          class="w-full py-2.5 bg-slate-800 text-white rounded-lg font-medium hover:bg-slate-700 focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-colors">
          Sign in
        </button>
      </form>
      <p class="mt-6 text-center text-slate-400 text-xs">
        Admins and users can sign in to manage the website.
      </p>
    </div>
    <p class="mt-4 text-center">
      <a href="/" class="text-slate-500 text-sm hover:text-slate-700">← Back to website</a>
    </p>
  </div>
  <script>
    const API = window.location.origin;
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          window.location.href = '/admin';
          return;
        }
        errEl.textContent = data.error || 'Login failed';
        errEl.classList.remove('hidden');
      } catch (e) {
        errEl.textContent = 'Network error. Is the backend running?';
        errEl.classList.remove('hidden');
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    });
  </script>
</body>
</html>
